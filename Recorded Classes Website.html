  class="fixed text-whi<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Course Platform</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body { background:#000; color:#fff; min-height:100vh; }
.layout { display:grid; grid-template-columns:300px 1fr; min-height:100vh; }
.sidebar { background:#0b0b0b; border-right:1px solid #222; padding:25px; overflow-y:auto; }
.logo { color:#ff2b2b; font-size:26px; margin-bottom:5px; }
.subtitle { font-size:12px; color:#777; margin-bottom:25px; }
.lesson { background:#111; border:1px solid #222; padding:12px; border-radius:8px; margin-bottom:10px; cursor:pointer; transition:.3s; }
.lesson:hover { background:#1a1a1a; border:1px solid #ff2b2b; }
.lesson.completed { border-color:#2ecc71; color:#2ecc71; }
.content { padding:30px; flex:1; }
#emptyState { color:#666; font-size:22px; margin-top:200px; text-align:center; }
#playerSection { display:none; }
#videoPlayer, #customVideo { width:100%; height:500px; border-radius:12px; border:1px solid #222; background:#000; }
.progressContainer { height:6px; background:#222; margin-top:10px; border-radius:20px; }
#progressBar { height:6px; width:0%; background:#ff2b2b; border-radius:20px; transition:width .3s; }
#watermark { position:fixed; color:rgba(255,255,255,.18); font-size:14px; pointer-events:none; z-index:999; font-weight:bold; }
#youtubeLink { margin-top:20px; font-size:18px; color:#ff2b2b; text-decoration:underline; cursor:pointer; display:none; }
#youtubeLink:hover { color:#ff4444; }

@media (max-width:768px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { width:100%; height:auto; border-right:none; border-bottom:1px solid #222; }
  #videoPlayer, #customVideo { height:300px; }
}
</style>
</head>
<body>

<div id="watermark"></div>

<div class="layout">

  <div class="sidebar">
    <h1 class="logo">RedSpecter</h1>
    <p class="subtitle">Learn Hacking</p>
    <div id="lessonList"></div>
  </div>

  <div class="content">
    <div id="emptyState">Select a lesson to start learning</div>
    <div id="playerSection">
      <h2 id="lessonTitle"></h2>
      <iframe id="videoPlayer" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      <video id="customVideo" controls style="display:none;"></video>
      <a id="youtubeLink" href="#" target="_blank" rel="noopener"></a>
      <div class="progressContainer"><div id="progressBar"></div></div>
    </div>
  </div>

</div>

<script>
/////////////////////////////
// LESSON DATA
/////////////////////////////
const lessons = [
  { title:"Part 1 - Introduction to Web Development", url:"https://www.youtube.com/embed/dD2EISBDjWM" },
  { title:"Part 2 - HTML Basics", url:"https://www.youtube.com/embed/UB1O30fR-EE" },
  { title:"Part 3 - CSS Fundamentals", url:"https://www.youtube.com/embed/yfoY53QXEnI" },
  { title:"Part 4 - JavaScript Introduction", url:"https://www.youtube.com/embed/Jk8r2FUno&list" },
 { title:"Part 5 - CSS Fundamentals", url:"https://www.youtube.com/embed/VMYliGncpi0" },
 { title:"Part 5 - CSS Fundamentals", url:"https://www.youtube.com/embed/VMYliGncpi0" },
];

/////////////////////////////
// ELEMENTS
/////////////////////////////
const lessonList = document.getElementById("lessonList"),
      player = document.getElementById("videoPlayer"),
      customVideo = document.getElementById("customVideo"),
      youtubeLink = document.getElementById("youtubeLink"),
      title = document.getElementById("lessonTitle"),
      empty = document.getElementById("emptyState"),
      section = document.getElementById("playerSection"),
      progressBar = document.getElementById("progressBar");

/////////////////////////////
// RENDER LESSONS
/////////////////////////////
function renderLessons(){
  lessonList.innerHTML = "";
  const completedLessons = JSON.parse(localStorage.getItem("completedLessons")||"[]");
  lessons.forEach((lesson,index)=>{
    const div = document.createElement("div");
    div.className="lesson";
    if(completedLessons.includes(index)) div.classList.add("completed");
    div.innerText=lesson.title;
    div.onclick=()=>playLesson(index);
    lessonList.appendChild(div);
  });
}
renderLessons();

/////////////////////////////
// PLAY LESSON
/////////////////////////////
let currentLesson=0;
function playLesson(index){
  currentLesson=index;
  empty.style.display="none";
  section.style.display="block";
  const lesson=lessons[index];
  title.innerText=lesson.title;

  // Hide all players first
  player.style.display="none";
  customVideo.style.display="none";
  youtubeLink.style.display="none";

  // Handle local video
  if(lesson.type==="local"){
    customVideo.src=lesson.url;
    customVideo.style.display="block";
    const timestamps = JSON.parse(localStorage.getItem("videoTimestamps")||"{}");
    customVideo.currentTime = timestamps[lesson.url] || 0;
    customVideo.play();
    // Save timestamp every 5 seconds
    clearInterval(window.videoTimer);
    window.videoTimer=setInterval(()=>{
      const ts = JSON.parse(localStorage.getItem("videoTimestamps")||"{}");
      ts[lesson.url]=customVideo.currentTime;
      localStorage.setItem("videoTimestamps",JSON.stringify(ts));
    },5000);
  } else {
    player.src=lesson.url+"?enablejsapi=1&rel=0";
    player.style.display="block";
  }

  markLessonCompleted(index);
  updateProgress(index);
  scrollToLesson(index);
}

/////////////////////////////
// LESSON COMPLETION
/////////////////////////////
function markLessonCompleted(index){
  let completed=JSON.parse(localStorage.getItem("completedLessons")||"[]");
  if(!completed.includes(index)) completed.push(index);
  localStorage.setItem("completedLessons",JSON.stringify(completed));
  renderLessons();
}

/////////////////////////////
// PROGRESS
/////////////////////////////
function updateProgress(index){
  localStorage.setItem("courseProgress",index);
  progressBar.style.width=((index+1)/lessons.length*100)+"%";
}

window.onload=()=>{
  const saved=parseInt(localStorage.getItem("courseProgress"));
  if(!isNaN(saved)) progressBar.style.width=((saved+1)/lessons.length*100)+"%";
}

function scrollToLesson(index){
  const lessonElements=document.querySelectorAll(".lesson");
  lessonElements[index].scrollIntoView({behavior:"smooth",block:"center"});
}

/////////////////////////////
// WATERMARK
/////////////////////////////
const watermark=document.getElementById("watermark");
const studentID="Student_"+Math.floor(Math.random()*9000+1000);
watermark.innerText=studentID;
setInterval(()=>{
  watermark.style.top=Math.random()*85+"%";
  watermark.style.left=Math.random()*85+"%";
},3000);

/////////////////////////////
// SECURITY
/////////////////////////////
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J"].includes(e.key))||(e.ctrlKey&&e.key==="U")){
    e.preventDefault(); alert("Developer tools disabled");
  }
});
setInterval(()=>{
  if(window.outerWidth-window.innerWidth>200){
    document.body.innerHTML=`<h1 style="color:red;text-align:center;margin-top:200px">Developer Tools Detected</h1>`;
  }
},1000);
</script>

</body>

<div class="min-h-screen grid grid-cols-12">

  <!-- Sidebar -->
  <div class="col-span-3 border-r border-red-900/40 p-5 bg-gradient-to-b from-black to-zinc-950">
    <h1 class="text-2xl font-bold text-red-500 mb-1 tracking-wide">BROTYPE</h1>
    <p class="text-xs text-gray-500 mb-6">Brother You Never Had</p>

    <div class="mb-6">
      <p class="text-sm text-gray-400 mb-2">Daily Limit</p>
      <div class="w-full bg-zinc-800 rounded-full h-2">
        <div id="progressBar" class="bg-red-500 h-2 rounded-full" style="width:0%"></div>
      </div>
      <p id="progressText" class="text-xs mt-2 text-gray-400"></p>
    </div>

    <div id="videoList" class="space-y-2"></div>
  </div>

  <!-- Player -->
  <div class="col-span-9 p-6">
    <div id="emptyState" class="h-full flex items-center justify-center text-gray-500">
      Select a video to start learning
    </div>

    <div id="playerSection" class="hidden space-y-4">
      <h2 id="videoTitle" class="text-xl font-semibold"></h2>

      <video id="videoPlayer"
        controls
        controlsList="nodownload noremoteplayback"
        disablePictureInPicture
        class="w-full rounded-2xl border border-zinc-800">
      </video>

      <div id="limitMsg" class="text-red-400 font-medium hidden">
        🔒 Daily limit reached. Next videos available after 24 hours.
      </div>
    </div>
  </div>
</div>

<script>
// ================= CONFIG =================
const VIDEOS = [
  { id: 1, title: "Part 1 | Introduction to Web Designing", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
  { id: 2, title: "Part 2 | HTML Basics", url: "https://www.w3schools.com/html/movie.mp4" },
  { id: 3, title: "Part 3 | CSS Fundamentals", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
  { id: 4, title: "Part 4 | JavaScript Intro", url: "https://www.w3schools.com/html/movie.mp4" }
];

const DAILY_LIMIT = 2;

// ================= UTIL =================
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

let data = JSON.parse(localStorage.getItem("video_watch_data") || "{}");

if (data.date !== todayKey()) {
  data = { date: todayKey(), count: 0, ids: [] };
  localStorage.setItem("video_watch_data", JSON.stringify(data));
}

// ================= ELEMENTS =================
const videoList = document.getElementById("videoList");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const player = document.getElementById("videoPlayer");
const titleEl = document.getElementById("videoTitle");
const emptyState = document.getElementById("emptyState");
const playerSection = document.getElementById("playerSection");
const limitMsg = document.getElementById("limitMsg");

// ================= PROGRESS =================
function updateProgress() {
  const percent = (data.count / DAILY_LIMIT) * 100;
  progressBar.style.width = percent + "%";
  progressText.textContent = `${data.count}/${DAILY_LIMIT} videos watched today`;
}

// ================= RENDER =================
function renderVideos() {
  videoList.innerHTML = "";

  VIDEOS.forEach(video => {
    const watched = data.ids.includes(video.id);
    const locked = data.count >= DAILY_LIMIT && !watched;

    const card = document.createElement("div");
    card.className =
      `bg-zinc-900 border border-zinc-800 p-3 rounded-xl flex gap-3 items-center cursor-pointer transition
      ${locked ? 'opacity-60' : 'hover:border-red-600 hover:bg-zinc-800'}`;

    card.innerHTML = `
      <span class="text-red-500">${watched ? '✅' : locked ? '🔒' : '▶️'}</span>
      <p class="text-sm">${video.title}</p>
    `;

    card.onclick = () => playVideo(video, locked);
    videoList.appendChild(card);
  });
}

// ================= PLAY =================
function playVideo(video, locked) {
  if (locked) return;

  if (!data.ids.includes(video.id)) {
    data.count++;
    data.ids.push(video.id);
    localStorage.setItem("video_watch_data", JSON.stringify(data));
  }

  emptyState.classList.add("hidden");
  playerSection.classList.remove("hidden");

  player.src = video.url;
  titleEl.textContent = video.title;

  if (data.count >= DAILY_LIMIT) {
    limitMsg.classList.remove("hidden");
  }

  updateProgress();
  renderVideos();
}

// =================🔥 ANTI RECORDING =================

// 🚫 Right click
window.addEventListener("contextmenu", e => e.preventDefault());

// 🚫 Key blocks
document.addEventListener("keydown", e => {
  if (
    e.key === "PrintScreen" ||
    (e.ctrlKey && ["s","u","p"].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }
});

// 🚫 Tab switch pause
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    player.pause();
  }
});

// 🚫 DevTools detect (basic)
setInterval(() => {
  const threshold = 160;
  if (window.outerWidth - window.innerWidth > threshold) {
    player.pause();
  }
}, 1000);

// =================🔥 MOVING WATERMARK =================
setInterval(() => {
  const wm = document.getElementById("watermark");
  wm.style.top = Math.random() * 80 + "%";
  wm.style.left = Math.random() * 80 + "%";
}, 3000);

// ================= INIT =================
updateProgress();
renderVideos();
</script>

</body>
</html>
